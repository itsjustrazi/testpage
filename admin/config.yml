backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: ms

collections:

  # ── SUBSALES LISTINGS ──────────────────────────────────────
  - name: "subsales"
    label: "🏠 Subsales Listings"
    label_singular: "Listing Subsale"
    folder: "_data/subsales"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    summary: "{{title}} — RM{{harga}} | {{kawasan}}"
    sortable_fields: ["kawasan", "harga", "tarikh"]
    fields:

      - label: "Tajuk Listing"
        name: "title"
        widget: "string"
        hint: "Contoh: Flat Bandar Selesa Jaya — Tingkat 3"

      - label: "Status Listing"
        name: "status"
        widget: "select"
        options:
          - { label: "✅ Aktif (Published)", value: "aktif" }
          - { label: "⏸ Draft (Belum Publish)", value: "draft" }
          - { label: "❌ Terjual / Tidak Aktif", value: "terjual" }
        default: "aktif"

      - label: "Jenis Hartanah"
        name: "jenis"
        widget: "select"
        options:
          - { label: "Flat / Apartment", value: "Flat" }
          - { label: "Rumah Teres 1 Tingkat", value: "Teres 1 Tingkat" }
          - { label: "Rumah Teres 2 Tingkat", value: "Teres 2 Tingkat" }
          - { label: "Semi D", value: "Semi D" }
          - { label: "Kondominium", value: "Kondominium" }
          - { label: "Rumah Banglo", value: "Banglo" }
          - { label: "Lain-lain", value: "Lain-lain" }

      - label: "Kawasan / Daerah"
        name: "kawasan"
        widget: "select"
        options:
          - { label: "Skudai / Bukit Indah", value: "skudai" }
          - { label: "Tebrau / Setia Indah", value: "tebrau" }
          - { label: "Masai / Seri Alam", value: "masai" }
          - { label: "Pasir Gudang", value: "pasir-gudang" }
          - { label: "Permas Jaya", value: "permas-jaya" }
          - { label: "Plentong", value: "plentong" }
          - { label: "Iskandar Puteri", value: "iskandar-puteri" }
          - { label: "JB City", value: "jb-city" }
          - { label: "Kulai", value: "kulai" }
          - { label: "Senai", value: "senai" }
          - { label: "Lain-lain (Luar JB)", value: "lain-lain" }

      - label: "Nama Taman / Projek"
        name: "nama_taman"
        widget: "string"
        hint: "Contoh: Taman Selesa Jaya, Sri Putri, Desa Jaya"

      - label: "Alamat Penuh"
        name: "alamat"
        widget: "string"
        required: false
        hint: "Contoh: No 12, Jalan Selesa 1, 81300 Skudai"

      - label: "Harga Jual (RM)"
        name: "harga"
        widget: "number"
        value_type: "int"
        hint: "Masukkan nombor sahaja. Contoh: 135000"

      - label: "Saiz Unit (sqft)"
        name: "saiz_sqft"
        widget: "number"
        value_type: "int"
        required: false
        hint: "Contoh: 516"

      - label: "Bilangan Bilik Tidur"
        name: "bilik_tidur"
        widget: "number"
        value_type: "int"
        min: 0
        max: 10
        required: false

      - label: "Bilangan Bilik Air"
        name: "bilik_air"
        widget: "number"
        value_type: "int"
        min: 0
        max: 10
        required: false

      - label: "Tingkat"
        name: "tingkat"
        widget: "string"
        required: false
        hint: "Jika berkenaan. Contoh: 3, 2/3, Ground"

      - label: "Hak Milik (Tenure)"
        name: "tenure"
        widget: "select"
        required: false
        options:
          - { label: "Freehold", value: "Freehold" }
          - { label: "Leasehold", value: "Leasehold" }
          - { label: "Bumi Lot", value: "Bumi Lot" }

      - label: "Status Bumilot"
        name: "bumilot"
        widget: "select"
        required: false
        options:
          - { label: "Non-Bumilot (Terbuka)", value: "Non-Bumilot" }
          - { label: "Bumi Lot", value: "Bumi Lot" }

      - label: "Keadaan Unit"
        name: "keadaan"
        widget: "select"
        required: false
        options:
          - { label: "Bare (Kosong)", value: "Bare" }
          - { label: "Partially Furnished", value: "Partial Furnished" }
          - { label: "Fully Furnished", value: "Fully Furnished" }
          - { label: "Renovated", value: "Renovated" }
          - { label: "Perlu Ubahsuai", value: "Perlu Ubahsuai" }

      - label: "Highlights / Kelebihan Unit"
        name: "highlights"
        widget: "list"
        required: false
        hint: "Senarai kelebihan — satu per baris"
        field:
          label: "Kelebihan"
          name: "item"
          widget: "string"

      - label: "Gambar Utama (Hero)"
        name: "gambar_hero"
        widget: "image"
        hint: "Gambar pertama yang akan dipaparkan"

      - label: "Galeri Gambar Tambahan"
        name: "galeri"
        widget: "list"
        required: false
        hint: "Tambah sehingga 10 gambar"
        field:
          label: "Gambar"
          name: "gambar"
          widget: "image"

      - label: "Tarikh Listing Ditambah"
        name: "tarikh"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD/MM/YYYY"
        time_format: false
        default: ""

      - label: "WhatsApp Message (Pre-filled)"
        name: "wa_msg"
        widget: "string"
        required: false
        hint: "Mesej WhatsApp bila buyer klik. Biarkan kosong untuk guna default."

  # ── SITE SETTINGS ───────────────────────────────────────────
  - name: "settings"
    label: "⚙️ Tetapan Website"
    files:

      - label: "Maklumat Ejen"
        name: "ejen"
        file: "_data/settings/ejen.json"
        fields:
          - { label: "Nama Ejen", name: "nama", widget: "string", default: "Razi" }
          - { label: "No. WhatsApp", name: "whatsapp", widget: "string", default: "601154065243" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "The Fast & Easy JB Property Guy" }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }
          - { label: "YouTube URL", name: "youtube", widget: "string", required: false }
