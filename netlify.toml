[build]
  publish = "."
  command = "python3 generate-listings.py"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"

# Allow listings.json to be fetched from JS
[[headers]]
  for = "/listings.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "no-cache"
